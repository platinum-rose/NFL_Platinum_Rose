name: Player Injury Ingest

on:
  schedule:
    # Mon 14:00 UTC — post-weekend sweep; captures off-season OTA / roster news
    - cron: '0 14 * * 1'
    # Wed 14:00 UTC — mid-week practice report window (in-season)
    - cron: '0 14 * * 3'
    # Thu 14:00 UTC — injury estimation day (in-season)
    - cron: '0 14 * * 4'
    # Fri 18:00 UTC — final injury designation before Sunday games (in-season)
    - cron: '0 18 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (fetch + parse only, no Supabase writes)'
        type: boolean
        default: true
      status_filter:
        description: >
          Comma-separated statuses to capture (blank = all non-trivial).
          e.g. "Out,Doubtful,Questionable,Probable"
        type: string
        required: false

jobs:
  injury-ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Run InjuryIngestAgent
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN:                   ${{ inputs.dry_run || 'false' }}
          INJURY_STATUS_FILTER:      ${{ inputs.status_filter || '' }}
        run: node agents/injury-ingest.js

      - name: Upload receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: injury-ingest-receipt-${{ github.run_number }}
          path: .nfl/receipts/injury-ingest-*.json
          retention-days: 30
