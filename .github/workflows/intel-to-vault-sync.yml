name: intel-to-vault-sync

on:
  schedule:
    # Mondays 10:00 UTC — after Sunday games + overnight research-intel run (9pm UTC)
    - cron: '0 10 * * 1'
    # Thursdays 10:00 UTC — mid-week intel sweep (Sharp Thursday pod, Wed analysis)
    - cron: '0 10 * * 4'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no writes to vault_notes)'
        type: boolean
        default: true
      week:
        description: 'NFL week number (e.g. 5) — added to intel section header'
        type: string
        required: false
      team:
        description: 'Single team abbreviation to update (e.g. KC). Leave blank for all.'
        type: string
        required: false
      lookback_days:
        description: 'How many days of intel to scan (default: 7)'
        type: string
        default: '7'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run intel-to-vault-sync
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN:    ${{ inputs.dry_run || 'false' }}
          INTEL_LOOKBACK_DAYS: ${{ inputs.lookback_days || '7' }}
        run: |
          ARGS=""
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.week }}" ]; then
            ARGS="$ARGS --week ${{ inputs.week }}"
          fi
          if [ -n "${{ inputs.team }}" ]; then
            ARGS="$ARGS --team ${{ inputs.team }}"
          fi
          node agents/intel-to-vault-sync.js $ARGS

      - name: Upload receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intel-vault-receipt-${{ github.run_number }}
          path: .nfl/receipts/intel-vault-*.json
          retention-days: 30
