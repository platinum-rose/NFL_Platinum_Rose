name: Auto-Scrape Betting Splits

on:
  schedule:
    # Daily at 10:00 UTC (3am PST) — after futures ingest, before dashboard reads
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows manual on-demand trigger

concurrency:
  group: git-push-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        run: |
          python scripts/scrape_splits.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Platinum Rose Bot"
          git config --global user.email "bot@platinumrose.app"
          git add betting_splits.json
          # Only commit and push if data changed
          if ! { git diff --quiet && git diff --staged --quiet; }; then
            git commit -m "📈 Auto-update Betting Splits"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break
              echo "Push attempt $i failed, retrying in $((i * 5))s..."
              sleep $((i * 5))
            done
          fi
